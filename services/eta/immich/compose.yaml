services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    container_name: immich_server
    restart: always
    env_file:
      - ./.env
    volumes:
      - ${IMMICH_UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - redis
      - database
    healthcheck:
      disable: false
    networks:
      - ingress
      - internal
    labels:
      traefik.enable: "true"
      traefik.http.routers.immich.entrypoints: websecure
      traefik.http.routers.immich.rule: Host(`${IMMICH_TRAEFIK_HOST}`)
      traefik.http.routers.immich.tls: "true"
      traefik.http.services.immich.loadbalancer.server.port: "2283"
      traefik.http.middlewares.immich-upload-limit.buffering.maxRequestBodyBytes: "2000000000"
      traefik.http.routers.immich.middlewares: immich-upload-limit

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    container_name: immich_machine_learning
    restart: always
    env_file:
      - ./.env
    volumes:
      - ${HOME}/Services/data/immich/model-cache:/cache
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import sys, urllib.request; response = urllib.request.urlopen('http://127.0.0.1:3003/ping', timeout=2); sys.exit(0 if response.status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  redis:
    image: docker.io/valkey/valkey:8
    container_name: immich_redis
    restart: always
    healthcheck:
      test: redis-cli ping || exit 1
    networks:
      - internal

  database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich_postgres
    restart: always
    env_file:
      - ./.env
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: --data-checksums
    volumes:
      - ${HOME}/Services/data/immich/postgres:/var/lib/postgresql/data
    shm_size: 128mb
    networks:
      - internal

networks:
  ingress:
    name: proxy-network
    external: true
  internal:
