services:
  baikal:
    image: ckulka/baikal:nginx
    container_name: baikal
    restart: always
    env_file:
      - ./.env
    volumes:
      - ${HOME}/Services/data/baikal/config:/var/www/baikal/config
      - ${HOME}/Services/data/baikal/specific:/var/www/baikal/Specific
    networks:
      - ingress
    labels:
      traefik.enable: "true"
      traefik.http.routers.baikal.entrypoints: websecure
      traefik.http.routers.baikal.rule: Host(`${BAIKAL_HOST}`)
      traefik.http.routers.baikal.tls: "true"
      traefik.http.services.baikal.loadbalancer.server.port: "80"

networks:
  ingress:
    name: proxy-network
    external: true
