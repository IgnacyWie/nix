services:
  redis:
    image: redis:7.4-alpine
    container_name: dawarich_redis
    command: redis-server
    restart: always
    volumes:
      - ${HOME}/Services/data/dawarich/redis:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  database:
    image: imresamu/postgis:17-3.5-alpine
    container_name: dawarich_db
    shm_size: 1G
    restart: always
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-dawarich_development}
    volumes:
      - ${HOME}/Services/data/dawarich/postgres:/var/lib/postgresql/data
      - ${HOME}/Services/data/dawarich/shared:/var/shared
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-dawarich_development}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  app:
    image: freikin/dawarich:latest
    container_name: dawarich_app
    restart: on-failure
    stdin_open: true
    tty: true
    entrypoint: web-entrypoint.sh
    command: ["bin/rails", "server", "-p", "3000", "-b", "::"]
    env_file:
      - ./.env
    environment:
      RAILS_ENV: ${RAILS_ENV:-development}
      REDIS_URL: redis://redis:6379
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB:-dawarich_development}
      APPLICATION_HOSTS: ${APPLICATION_HOSTS:-localhost,::1,127.0.0.1,map.mac.wie.dev}
      APPLICATION_PROTOCOL: ${APPLICATION_PROTOCOL:-http}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      RAILS_LOG_TO_STDOUT: ${RAILS_LOG_TO_STDOUT:-true}
      SELF_HOSTED: ${SELF_HOSTED:-true}
      STORE_GEODATA: ${STORE_GEODATA:-true}
      TIME_ZONE: ${TIME_ZONE:-Europe/Amsterdam}
      MIN_MINUTES_SPENT_IN_CITY: ${MIN_MINUTES_SPENT_IN_CITY:-60}
    volumes:
      - ${HOME}/Services/data/dawarich/public:/var/app/public
      - ${HOME}/Services/data/dawarich/watched:/var/app/tmp/imports/watched
      - ${HOME}/Services/data/dawarich/storage:/var/app/storage
    depends_on:
      database:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
    networks:
      - internal
      - ingress
    labels:
      traefik.enable: "true"
      traefik.http.routers.dawarich.entrypoints: websecure
      traefik.http.routers.dawarich.rule: Host(`${DAWARICH_HOST}`)
      traefik.http.routers.dawarich.tls: "true"
      traefik.http.services.dawarich.loadbalancer.server.port: "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO - http://127.0.0.1:3000/api/v1/health | grep -q '\"status\"[[:space:]]*:[[:space:]]*\"ok\"'"]
      interval: 10s
      retries: 30
      start_period: 30s
      timeout: 10s

  sidekiq:
    image: freikin/dawarich:latest
    container_name: dawarich_sidekiq
    restart: on-failure
    stdin_open: true
    tty: true
    entrypoint: sidekiq-entrypoint.sh
    command: ["sidekiq"]
    env_file:
      - ./.env
    environment:
      RAILS_ENV: ${RAILS_ENV:-development}
      REDIS_URL: redis://redis:6379
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB:-dawarich_development}
      APPLICATION_HOSTS: ${APPLICATION_HOSTS:-localhost,::1,127.0.0.1}
      APPLICATION_PROTOCOL: ${APPLICATION_PROTOCOL:-http}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      RAILS_LOG_TO_STDOUT: ${RAILS_LOG_TO_STDOUT:-true}
      SELF_HOSTED: ${SELF_HOSTED:-true}
      STORE_GEODATA: ${STORE_GEODATA:-true}
      BACKGROUND_PROCESSING_CONCURRENCY: ${BACKGROUND_PROCESSING_CONCURRENCY:-10}
    volumes:
      - ${HOME}/Services/data/dawarich/public:/var/app/public
      - ${HOME}/Services/data/dawarich/watched:/var/app/tmp/imports/watched
      - ${HOME}/Services/data/dawarich/storage:/var/app/storage
    depends_on:
      database:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
      app:
        condition: service_healthy
        restart: true
    networks:
      - internal

networks:
  ingress:
    name: proxy-network
    external: true
  internal:
