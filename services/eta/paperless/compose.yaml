services:
  broker:
    image: docker.io/library/redis:8
    restart: unless-stopped
    volumes:
      - ${HOME}/Services/data/paperless/redis:/data
    networks:
      - internal

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_TIKA_ENABLED: "1"
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
    depends_on:
      - broker
      - gotenberg
      - tika
    volumes:
      - ${HOME}/Services/data/paperless/data:/usr/src/paperless/data
      - ${HOME}/Services/data/paperless/media:/usr/src/paperless/media
      - ${HOME}/Services/data/paperless/export:/usr/src/paperless/export
      - ${HOME}/Services/data/paperless/consume:/usr/src/paperless/consume
    networks:
      - ingress
      - internal
    labels:
      traefik.enable: "true"
      traefik.http.routers.paperless.entrypoints: websecure
      traefik.http.routers.paperless.rule: Host(`${PAPERLESS_HOST}`)
      traefik.http.routers.paperless.tls: "true"
      traefik.http.services.paperless.loadbalancer.server.port: "8000"

  gotenberg:
    image: docker.io/gotenberg/gotenberg:8.25
    restart: unless-stopped
    command:
      - gotenberg
      - --chromium-disable-javascript=true
      - --chromium-allow-list=file:///tmp/.*
    networks:
      - internal

  tika:
    image: docker.io/apache/tika:latest
    restart: unless-stopped
    networks:
      - internal

networks:
  ingress:
    name: proxy-network
    external: true
  internal:
